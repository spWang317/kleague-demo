<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>K리그 입덕 가이드 (Demo)</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;}
  body{background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .wrap{max-width:520px;width:100%;text-align:center;}
  .logo{font-size:42px;margin-bottom:10px;}
  h1{font-size:28px;margin-bottom:8px;}
  .tag{color:#94a3b8;font-size:15px;line-height:1.6;margin-bottom:36px;}
  .tag b{color:#cbd5e1;}
  .btns{display:flex;flex-direction:column;gap:14px;}
  .pick{display:block;background:#1e293b;border:1px solid #334155;border-radius:14px;padding:24px 22px;text-decoration:none;color:#e2e8f0;text-align:left;transition:all .15s;}
  .pick:hover{border-color:#3b82f6;background:#1e3a5f;transform:translateY(-2px);}
  .pick .ic{font-size:28px;}
  .pick .t{font-size:19px;font-weight:700;margin:8px 0 4px;}
  .pick .d{font-size:13px;color:#94a3b8;line-height:1.5;}
  .foot{color:#475569;font-size:12px;margin-top:34px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">⚽</div>
  <h1>K리그, 어떻게 시작할까요?</h1>
  <p class="tag">통계가 아니라 <b>응원할 이유</b>를 찾아주는 AI.<br>입덕 방식을 골라보세요.</p>
  <div class="btns">
    <a class="pick" href="team.html">
      <div class="ic">🏟️</div>
      <div class="t">응원할 팀 추천</div>
      <div class="d">9개 질문에 답하면, 거리·취향에 맞는 K리그 팀을 찾아드려요.</div>
    </a>
    <a class="pick" href="players.html">
      <div class="ic">👤</div>
      <div class="t">좋아할 선수 추천</div>
      <div class="d">비주얼 또는 플레이스타일로, 마음에 들 K리그 선수를 찾아드려요.</div>
    </a>
  </div>
  <p class="foot">한국축구과학회·PLCO 공모전 프로토타입 · 데이터: K리그·나무위키 등</p>
</div>
</body>
</html>
