<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>K리그 선수·감독 스타일 매칭 (Demo)</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif; }
  body { background:#0f172a; color:#e2e8f0; min-height:100vh; padding:24px; }
  .container { max-width:760px; margin:0 auto; }
  h1 { font-size:26px; margin-bottom:6px; }
  .sub { color:#94a3b8; margin-bottom:8px; font-size:14px; }
  .back { color:#60a5fa; font-size:13px; text-decoration:none; }
  .card { background:#1e293b; border-radius:12px; padding:20px; margin:18px 0; border:1px solid #334155; }
  label.lbl { display:block; font-size:13px; color:#94a3b8; margin:14px 0 6px; }
  select { width:100%; background:#0f172a; color:#e2e8f0; border:1px solid #334155; padding:11px 14px; border-radius:8px; font-size:15px; }
  .toggle { display:flex; gap:8px; margin-top:6px; }
  .toggle button { flex:1; background:#0f172a; border:1px solid #334155; color:#cbd5e1; padding:10px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; }
  .toggle button.on { background:#1e40af; border-color:#3b82f6; color:#fff; }
  .chk { display:flex; align-items:center; gap:8px; margin-top:12px; font-size:13px; color:#cbd5e1; }
  .refbox { background:#0f172a; border-left:3px solid #60a5fa; padding:10px 14px; border-radius:4px; margin-top:12px; font-size:13px; line-height:1.6; }
  .refbox .nm { color:#60a5fa; font-weight:700; }
  h2 { font-size:15px; color:#64748b; margin:22px 0 10px; text-transform:uppercase; letter-spacing:1px; }
  .row { background:#0f172a; padding:14px 16px; border-radius:8px; margin-bottom:9px; border:1px solid #1e293b; }
  .row .top { display:flex; justify-content:space-between; align-items:center; }
  .row .nm { font-weight:700; font-size:17px; }
  .row .meta { color:#64748b; font-size:12px; margin-left:6px; }
  .row .sim { background:#3b82f6; color:#fff; padding:4px 11px; border-radius:12px; font-size:13px; font-weight:700; }
  .row .desc { color:#94a3b8; font-size:12.5px; margin-top:7px; line-height:1.55; }
  .foot { color:#64748b; font-size:12px; margin-top:22px; line-height:1.6; }
  .rank { color:#3b82f6; font-weight:800; margin-right:8px; }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="index.html">← 팀 추천으로</a>
  <h1>⚽ K리그 선수·감독 스타일 매칭</h1>
  <p class="sub">좋아하는 해외 선수·감독을 고르면, AI가 <b>플레이스타일 임베딩 유사도</b>로 닮은 K리그 선수·감독을 찾아줍니다.</p>

  <div class="card">
    <label class="lbl">무엇을 찾을까요?</label>
    <div class="toggle">
      <button id="t-player" class="on" onclick="setRole('player')">닮은 선수 찾기</button>
      <button id="t-coach" onclick="setRole('coach')">닮은 감독 찾기</button>
    </div>

    <label class="lbl" id="reflbl">좋아하는 해외 선수</label>
    <select id="ref" onchange="run()"></select>

    <label class="chk" id="poswrap"><input type="checkbox" id="samepos" checked onchange="run()"> 같은 포지션군만 보기</label>

    <div class="refbox" id="refbox"></div>
  </div>

  <div id="results"></div>

  <p class="foot">
    엔진: 문장 임베딩 <b>multilingual-e5</b> · 코사인 유사도 매칭 (플레이스타일 텍스트 기반)<br>
    ※ 데모 시드 데이터입니다. 선수·감독·스타일 텍스트는 나무위키 등으로 확장·검증됩니다.
  </p>
</div>

<script>
let DATA=null, role='player';
const dot=(a,b)=>{let s=0;for(let i=0;i<a.length;i++)s+=a[i]*b[i];return s;};

fetch('players.json').then(r=>r.json()).then(d=>{DATA=d; fillRefs(); run();})
  .catch(e=>{document.getElementById('results').innerHTML='<div class="card">players.json 로드 실패</div>';});

function setRole(r){
  role=r;
  document.getElementById('t-player').className = r==='player'?'on':'';
  document.getElementById('t-coach').className  = r==='coach'?'on':'';
  document.getElementById('reflbl').textContent = r==='player'?'좋아하는 해외 선수':'좋아하는 해외 감독';
  document.getElementById('poswrap').style.display = r==='player'?'flex':'none';
  fillRefs(); run();
}
function fillRefs(){
  const sel=document.getElementById('ref'); sel.innerHTML='';
  DATA.entities.filter(e=>e.side==='reference'&&e.role===role)
    .forEach(e=>{const o=document.createElement('option');o.value=e.id;o.textContent=e.name+(e.role==='player'?` (${e.pos})`:'');sel.appendChild(o);});
}
function run(){
  if(!DATA) return;
  const ref=DATA.entities.find(e=>e.id===document.getElementById('ref').value);
  if(!ref) return;
  document.getElementById('refbox').innerHTML=`<span class="nm">${ref.name}</span> · ${ref.pos}<br>${ref.style}`;
  const samepos=document.getElementById('samepos').checked && role==='player';
  let cands=DATA.entities.filter(e=>e.side==='kleague'&&e.role===role);
  if(samepos) cands=cands.filter(e=>e.posGroup===ref.posGroup);
  const scored=cands.map(c=>({...c,sim:dot(ref.vec,c.vec)})).sort((a,b)=>b.sim-a.sim).slice(0,5);
  const labels=role==='player'?'선수':'감독';
  let html=`<h2>${ref.name}와(과) 닮은 K리그 ${labels} Top ${scored.length}</h2>`;
  if(!scored.length){ html+='<div class="card">조건에 맞는 후보가 없어요. 포지션 필터를 꺼보세요.</div>'; }
  scored.forEach((c,i)=>{
    html+=`<div class="row"><div class="top">
      <div><span class="rank">${i+1}</span><span class="nm">${c.name}</span><span class="meta">${c.team} · ${c.pos}</span></div>
      <div class="sim">${Math.round(c.sim*100)}%</div></div>
      <div class="desc">${c.style}</div></div>`;
  });
  document.getElementById('results').innerHTML=html;
}
</script>
</body>
</html>
