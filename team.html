<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>K리그 팀 찾기 (Demo)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; }
  body { background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 24px; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 28px; margin-bottom: 8px; }
  .sub { color: #94a3b8; margin-bottom: 32px; font-size: 14px; }
  .card { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid #334155; }
  .card h2 { font-size: 14px; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .card .q { font-size: 22px; font-weight: 600; margin-bottom: 20px; line-height: 1.4; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt { background: #0f172a; border: 1px solid #334155; padding: 14px 18px; border-radius: 8px; cursor: pointer; transition: all 0.15s; font-size: 15px; }
  .opt:hover { border-color: #60a5fa; background: #1e3a5f; }
  .opt.selected { border-color: #3b82f6; background: #1e40af; }
  .opt .label { font-weight: 500; }
  .opt .desc { font-size: 12px; color: #94a3b8; margin-top: 4px; }
  select { background:#0f172a; color:#e2e8f0; border:1px solid #334155; padding:10px 12px; border-radius:6px; font-size:14px; }
  .nav { display: flex; justify-content: space-between; gap: 12px; margin-top: 24px; }
  button { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 600; }
  button:hover { background: #2563eb; }
  button.secondary { background: #475569; }
  button.secondary:hover { background: #64748b; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .progress { background: #334155; height: 4px; border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar { background: #3b82f6; height: 100%; transition: width 0.3s; }
  .warning { background: #422006; border: 1px solid #d97706; color: #fbbf24; padding: 12px 16px; border-radius: 8px; margin-top: 12px; font-size: 13px; }
  .filters { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
  .filters label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }
  .result-group { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
  .result-group h3 { font-size: 14px; color: #60a5fa; margin-bottom: 12px; }
  .result-group h3.fallback { color: #f59e0b; }
  .team-card { background: #0f172a; padding: 14px 18px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .team-card .name { font-weight: 600; font-size: 17px; }
  .team-card .meta { font-size: 12px; color: #64748b; margin-top: 4px; }
  .team-card .score-badge { background: #3b82f6; color: white; padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; }
  .empty-result { color: #94a3b8; text-align: center; padding: 24px; }
</style>
</head>
<body>
<div class="container">
  <p class="sub" style="margin:0 0 10px;"><a href="index.html" style="color:#60a5fa;text-decoration:none;">← 처음으로</a></p>
  <h1>⚽ K리그 팀 찾기</h1>
  <p class="sub">대화형 추천 — 카드에 답하고 본인에게 맞는 팀을 찾아보세요</p>
  <div id="app"></div>
</div>

<script>
// ===== Data =====
const TEAMS_K1 = ['전북','울산','포항','FC서울','인천','대전','안양','제주','강원','광주','부천'];
const TEAMS_K2 = ['수원삼성','대구','성남','부산','전남','서울E','수원FC','경남','충남아산','안산','충북청주','용인','김포','천안','김해','파주','화성'];
const TEAMS = [...TEAMS_K1, ...TEAMS_K2];
const LEAGUE = Object.fromEntries([...TEAMS_K1.map(t=>[t,'K1']), ...TEAMS_K2.map(t=>[t,'K2'])]);

// ACL 진출 경험 (최근 10년 1회 이상)
const ACL = new Set(['전북','울산','포항','FC서울','수원삼성','제주','대구','강원','광주','대전','경남','인천']);

// 팀 이름 → 거리 매트릭스 키 (대부분 동일, 두 개만 다름)
const MKEY = {'FC서울':'서울','수원삼성':'수원'};
const mk = t => MKEY[t] || t;
// 거주지 선택용 17개 광역 (매트릭스 출발지 키와 동일)
const REGIONS = ['서울','경기','인천','강원','대전','세종','충남','충북','전북','광주','전남','대구','경북','부산','울산','경남','제주'];

let DIST = null;  // distance_matrix.json (오프라인 사전계산: 자차=카카오, 대중교통=ODsay)
fetch('data/distance_matrix.json').then(r=>r.json()).then(d=>{ DIST=d; if(state.step>=AXES.length+1) render(); }).catch(()=>{});

const SCORES = {
  trophy: {전북:5,성남:5,포항:5,FC서울:4,수원삼성:4,울산:4,부산:3,광주:2,대구:2,대전:2,전남:2,제주:2,
    강원:1,경남:1,김포:1,김해:1,부천:1,서울E:1,수원FC:1,안산:1,안양:1,용인:1,인천:1,천안:1,충남아산:1,충북청주:1,파주:1,화성:1},
  recent: {울산:5,전북:5,포항:4,FC서울:3,강원:2,광주:2,대구:2,대전:2,수원삼성:2,인천:2,
    경남:1,김포:1,김해:1,부산:1,부천:1,서울E:1,성남:1,수원FC:1,안산:1,안양:1,용인:1,전남:1,제주:1,천안:1,충남아산:1,충북청주:1,파주:1,화성:1},
  // 창단년도 기반(전신 포함, 오래될수록 높음): ~1985=5 / 86-95=4 / 96-05=3 / 06-14=2 / 15~=1
  heritage: {포항:5,울산:5,FC서울:5,부산:5,제주:5,
    성남:4,전북:4,전남:4,수원삼성:4,
    대전:3,대구:3,인천:3,수원FC:3,
    경남:2,김해:2,부천:2,강원:2,천안:2,광주:2,안양:2,김포:2,화성:2,파주:2,서울E:2,
    충남아산:1,안산:1,용인:1,충북청주:1},
  cheer: {수원삼성:5,포항:5,안양:5,인천:5,전북:5,부천:4,FC서울:4,울산:4,대구:4,
    광주:3,대전:3,강원:3,성남:3,부산:2,제주:2,수원FC:2,경남:2,안산:2,서울E:2,김포:2,천안:2,충남아산:2,충북청주:2,전남:2,
    화성:1,파주:1,용인:1,김해:1},
  goods: {대구:5,수원삼성:5,울산:5,전북:5,FC서울:4,성남:4,인천:4,서울E:4,안양:4,
    강원:3,광주:3,대전:3,전남:3,제주:3,부산:3,포항:3,
    경남:2,수원FC:2,안산:2,충남아산:2,부천:2,
    김포:1,김해:1,용인:1,천안:1,충북청주:1,파주:1,화성:1},
  fandom: {FC서울:5,전북:5,대구:5,인천:5,울산:5,수원삼성:5,포항:4,강원:4,대전:4,
    광주:3,부산:3,성남:3,부천:3,안양:3,제주:3,전남:3,
    충남아산:2,수원FC:2,경남:2,서울E:2,안산:2,충북청주:2,
    김포:1,김해:1,용인:1,천안:1,화성:1,파주:1},
  star: {전북:5,FC서울:5,대전:5,수원삼성:4,울산:4,포항:4,인천:4,제주:4,수원FC:4,용인:4,
    광주:3,강원:3,안양:3,충남아산:3,충북청주:3,부산:3,경남:3,대구:3,서울E:3,성남:3,
    부천:2,김포:2,안산:2,천안:2,김해:1,전남:1,파주:1,화성:1},
  tactic: {강원:1,수원삼성:1,안양:1,인천:1,제주:1},
  rival: {울산:5,포항:5,FC서울:4,수원삼성:4,안양:4,전북:4,부천:3,인천:3,제주:3,대전:2,수원FC:2},
};
TEAMS.forEach(t => {
  if (SCORES.tactic[t] === undefined) SCORES.tactic[t] = 0;
  if (SCORES.rival[t] === undefined) SCORES.rival[t] = 0;
});

const AXES = [
  {key:'trophy', name:'통산 우승', q:'많이 우승한 적이 있는 팀이 좋아요?', neg:'오히려 언더독이 좋아요'},
  {key:'recent', name:'최근 강세', q:'최근(2016-25) 잘하는 팀이 좋아요?', neg:'오히려 언더독이 좋아요'},
  {key:'heritage', name:'창단년도', q:'창단된 지 오래된(역사 깊은) 팀이 좋아요?', neg:null},
  {key:'cheer', name:'응원', q:'직관 분위기·응원이 뜨거운 팀이 좋아요?', neg:'차분한 분위기가 좋아요'},
  {key:'goods', name:'굿즈', q:'유니폼·굿즈가 예쁜 팀이 좋아요?', neg:null},
  {key:'fandom', name:'팬덤', q:'팬이 많고 큰 팀이 좋아요?', neg:null},
  {key:'star', name:'스타플레이어', q:'국가대표급 선수가 있는 팀이 좋아요?', neg:null},
  {key:'tactic', name:'전술', q:'전술이 인상적인 팀이 좋아요?', neg:null},
  {key:'rival', name:'라이벌', q:'뜨거운 라이벌 매치가 있는 팀이 좋아요?', neg:null},
];
const TOTAL = AXES.length + 1;  // 거리 카드 + 9개 취향 카드

// ===== State =====
const state = {
  step: -1, // -1=intro, 0=거리카드, 1..AXES.length=취향카드, AXES.length+1=결과
  filters: { leagueScope: 'any', aclOnly: false },
  dist: { region:'', mode:'car', pref:'', limit:60 },
  prefs: {},
};

// ===== Distance =====
function distMins(team) {
  if (!state.dist.region || !DIST) return null;
  const cell = (DIST[state.dist.region] || {})[mk(team)];
  if (!cell) return null;
  const m = state.dist.mode === 'transit' ? cell.transit : cell.car;
  return (m == null) ? null : m;
}
// 거리 점수(선호)는 calcMatch에서 상대 인버스(5 × 최단시간/해당시간)로 계산

// ===== Logic =====
let distFallback = false;  // 거리 필수인데 0팀 → 가장 가까운 팀 1개 자동 배정 시 true
function passesFilters(t) {
  if (state.filters.leagueScope === 'k1' && LEAGUE[t] !== 'K1') return false;
  if (state.filters.leagueScope === 'k2' && LEAGUE[t] !== 'K2') return false;
  if (state.filters.aclOnly && !ACL.has(t)) return false;
  return true;
}
function candidates() {
  distFallback = false;
  let list = TEAMS.filter(t => {
    if (!passesFilters(t)) return false;
    if (state.dist.region && state.dist.pref === 'required') {   // 거리 필수조건 = 하드 필터
      const m = distMins(t);
      if (m == null || m > state.dist.limit) return false;
    }
    return true;
  });
  // 거리 필수인데 한 팀도 없으면 → 가장 가까운 팀 1개 자동 배정
  if (list.length === 0 && state.dist.region && state.dist.pref === 'required') {
    const base = TEAMS.filter(t => passesFilters(t) && distMins(t) != null)
                      .sort((a, b) => distMins(a) - distMins(b));
    if (base.length) { list = [base[0]]; distFallback = true; }
  }
  return list;
}

function calcMatch() {
  const cands = candidates();
  const required = AXES.filter(a => state.prefs[a.key] === 'required');
  const preferred = AXES.filter(a => state.prefs[a.key] === 'preferred');
  const negative = AXES.filter(a => state.prefs[a.key] === 'negative');

  // 거리 점수(선호): 후보 중 가장 가까운 팀 = 5점, 나머지는 5 × (최단시간 / 해당팀시간)
  let tmin = null;
  if (state.dist.region && state.dist.pref === 'preferred') {
    const ms = cands.map(t => distMins(t)).filter(x => x != null);
    if (ms.length) tmin = Math.min(...ms);
  }

  return cands.map(t => {
    let reqMatched = 0;
    const reqHit = [], reqMiss = [];
    for (const a of required) {
      const max = Math.max(...Object.values(SCORES[a.key]));
      const threshold = max >= 4 ? 4 : Math.ceil(max * 0.8);
      if (SCORES[a.key][t] >= threshold) { reqMatched++; reqHit.push(a.name); }
      else reqMiss.push(a.name);
    }
    let bonus = 0;
    for (const a of preferred) bonus += (SCORES[a.key][t] || 0);
    for (const a of negative) bonus += (6 - (SCORES[a.key][t] || 0));
    let distBonus = 0;
    if (tmin != null) { const m = distMins(t); if (m != null) distBonus = Math.round(5 * tmin / m * 10) / 10; }
    bonus += distBonus;
    return { team: t, reqMatched, reqHit, reqMiss, bonus, distBonus };
  }).sort((a,b) => b.reqMatched - a.reqMatched || b.bonus - a.bonus);
}

// ===== Render =====
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  if (state.step === -1) renderIntro(app);
  else if (state.step === 0) renderDistCard(app);
  else if (state.step <= AXES.length) renderCard(app, state.step - 1);
  else renderResults(app);
}

function renderIntro(app) {
  app.innerHTML = `
    <div class="card">
      <h2>시작하기</h2>
      <p class="q">K리그에서 응원할 팀을 찾아드릴게요</p>
      <p style="color:#94a3b8;font-size:14px;line-height:1.6;margin-bottom:16px;">거리 + 9개 취향 카드에 답하면 본인에게 맞는 팀을 추천해드립니다. 각 카드에서:<br>
      <strong>꼭 그래야</strong> = 그 조건 만족 못하는 팀은 탈락<br>
      <strong>그러면 좋아요</strong> = 점수 가산<br>
      <strong>상관없음</strong> = 무시<br>
      <strong>오히려 반대</strong> = 반대 방향 가산 (일부 카드만)</p>
      <div class="filters">
        <div style="font-size:13px;color:#94a3b8;margin-bottom:4px;">리그 범위</div>
        <label><input type="radio" name="leagueScope" value="any" checked> 1부·2부 상관없어요</label>
        <label><input type="radio" name="leagueScope" value="k1"> K리그 1부 팀만</label>
        <label><input type="radio" name="leagueScope" value="k2"> K리그 2부 팀만</label>
        <div style="font-size:13px;color:#94a3b8;margin-top:8px;margin-bottom:4px;">국제대회</div>
        <label><input type="checkbox" id="aclOnly"> 최근 10년 ACL 진출 경험 있는 팀만 보기</label>
      </div>
      <div style="margin-top:16px;border-top:1px solid #334155;padding-top:14px;">
        <div style="font-size:13px;color:#a78bfa;margin-bottom:6px;">🤖 또는 한 문장으로 — AI가 카드를 대신 채워드려요 (Claude 키 입력 시)</div>
        <input id="nlq" placeholder="예: 집에서 가깝고 응원 뜨거운 우승권 팀" style="width:100%;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:6px;padding:9px 11px;font-size:14px;">
        <button onclick="aiSearch(this)" style="margin-top:8px;width:100%;background:#7c3aed;">AI로 바로 찾기 →</button>
      </div>
      <div class="nav">
        <span></span>
        <button onclick="startCards()">카드로 직접 →</button>
      </div>
    </div>
  `;
}

function renderDistCard(app) {
  const d = state.dist;
  const opts = [
    {k:'required',  label:'꼭 가까워야 해요 (필수)', desc:'정한 시간 이내인 팀만 남겨요'},
    {k:'preferred', label:'가까울수록 좋아요 (점수)', desc:'가까운 팀일수록 점수 가산'},
    {k:'neutral',   label:'거리는 상관없어요',        desc:'거리 무시'},
  ];
  const nextDisabled = d.region && !d.pref;   // 지역 골랐으면 조건도 선택해야
  app.innerHTML = `
    <div class="progress"><div class="progress-bar" style="width:${100/TOTAL}%"></div></div>
    <div class="card">
      <h2>카드 1 / ${TOTAL} — 경기장 접근성</h2>
      <p class="q">직관 가려면 가까워야죠. 어디 사세요?</p>
      <select id="dregion" onchange="setDistRegion(this.value)">
        <option value="">— 지역 선택 (또는 거리 신경 안 써요) —</option>
        ${REGIONS.map(r=>`<option value="${r}" ${d.region===r?'selected':''}>${r}</option>`).join('')}
      </select>
      <div style="margin-top:18px;${d.region?'':'opacity:.35;pointer-events:none;'}">
        <div style="font-size:13px;color:#94a3b8;margin-bottom:6px;">이동수단</div>
        <div class="options" style="flex-direction:row;">
          <div class="opt ${d.mode==='car'?'selected':''}" style="flex:1;text-align:center;" onclick="setDistMode('car')">🚗 자차</div>
          <div class="opt ${d.mode==='transit'?'selected':''}" style="flex:1;text-align:center;" onclick="setDistMode('transit')">🚇 대중교통</div>
        </div>
        <div style="font-size:13px;color:#94a3b8;margin:16px 0 6px;">조건</div>
        <div class="options">
          ${opts.map(o=>`<div class="opt ${d.pref===o.k?'selected':''}" onclick="selectDistPref('${o.k}')">
            <div class="label">${o.label}</div><div class="desc">${o.desc}</div></div>`).join('')}
        </div>
        ${d.pref==='required' ? `<div style="margin-top:12px;font-size:14px;color:#cbd5e1;">기준 시간 (${d.mode==='transit'?'대중교통':'자차'}):
          <select id="dlimit" onchange="setDistLimit(this.value)">
            ${[30,60,90,120].map(n=>`<option value="${n}" ${d.limit==n?'selected':''}>${n}분 이내</option>`).join('')}
          </select></div>` : ''}
      </div>
      <div class="nav">
        <button class="secondary" onclick="prev()">← 이전</button>
        <button onclick="next()" ${nextDisabled?'disabled':''}>다음 →</button>
      </div>
    </div>
  `;
}

function renderCard(app, i) {
  const a = AXES[i];
  const requiredCount = Object.values(state.prefs).filter(v => v === 'required').length;
  const tooMany = requiredCount >= 3;
  const cur = state.prefs[a.key];
  const opts = [
    {k:'required', label:'꼭 그래야 (필수)', desc:'이 조건 못 맞으면 탈락'},
    {k:'preferred', label:'그러면 좋아요 (점수)', desc:'점수 가산'},
    {k:'neutral', label:'상관없음', desc:'무시'},
  ];
  if (a.neg) opts.push({k:'negative', label:a.neg, desc:'반대 방향 가산'});

  app.innerHTML = `
    <div class="progress"><div class="progress-bar" style="width:${(i+2)/TOTAL*100}%"></div></div>
    <div class="card">
      <h2>카드 ${i+2} / ${TOTAL} — ${a.name}</h2>
      <p class="q">${a.q}</p>
      <div class="options">
        ${opts.map(o => `
          <div class="opt ${cur===o.k?'selected':''}" onclick="selectOpt('${a.key}','${o.k}')">
            <div class="label">${o.label}</div>
            <div class="desc">${o.desc}</div>
          </div>
        `).join('')}
      </div>
      ${tooMany && cur === 'required' ? '<div class="warning">⚠️ 필수 조건이 ' + requiredCount + '개입니다. 너무 많으면 매칭 결과가 없을 수 있어요.</div>' : ''}
      <div class="nav">
        <button class="secondary" onclick="prev()">← 이전</button>
        <button onclick="next()" ${!cur?'disabled':''}>${i===AXES.length-1?'결과 보기':'다음 →'}</button>
      </div>
    </div>
  `;
}

function renderResults(app) {
  if (state.dist.region && !DIST) { app.innerHTML = '<div class="empty-result">거리 데이터 불러오는 중…</div>'; return; }
  const results = calcMatch();
  const required = AXES.filter(a => state.prefs[a.key] === 'required');
  const reqCount = required.length;

  const groups = {};
  results.forEach(r => (groups[r.reqMatched] = groups[r.reqMatched] || []).push(r));

  let html = `<div class="nav" style="margin-bottom:16px;">
    <button class="secondary" onclick="restart()">↻ 다시 하기</button>
    <span></span>
  </div>
  <h2 style="margin-bottom:16px;">매칭 결과</h2>`;
  if (state.dist.region && state.dist.pref === 'required') {
    if (distFallback) {
      html += `<p class="sub" style="color:#fbbf24;margin-bottom:14px;">⚠️ ${state.dist.mode==='transit'?'대중교통':'자차'} ${state.dist.limit}분 이내인 팀이 없어, 가장 가까운 팀을 보여드려요.</p>`;
    } else {
      html += `<p class="sub" style="margin-bottom:14px;">📍 ${state.dist.region} 기준 · ${state.dist.mode==='transit'?'대중교통':'자차'} ${state.dist.limit}분 이내만</p>`;
    }
  }
  if (results.length === 0) {
    html += `<div class="result-group"><div class="empty-result">조건에 맞는 팀이 없어요. 거리 기준 시간을 늘리거나 필수 조건을 줄여보세요.</div></div>`;
    app.innerHTML = html; return;
  }
  if (reqCount === 0) {
    html += `<div class="result-group">
      <h3>점수 순위${state.dist.region?' (거리 가산 포함)':''}</h3>
      ${results.slice(0,8).map(r => teamCardHtml(r)).join('')}
    </div>`;
  } else {
    let foundAny = false;
    for (let k = reqCount; k >= 0; k--) {
      if (!groups[k] || groups[k].length === 0) continue;
      const isFull = k === reqCount;
      const isFallback = !isFull && !foundAny;
      const header = isFull
        ? `<h3>모든 필수 조건 만족 (${k}/${reqCount})</h3>`
        : `<h3 class="fallback">필수 ${k}/${reqCount}개 만족 (${isFallback?'⚠️ 모두 만족하는 팀 없음 — 가장 근접':'그 외'})</h3>`;
      html += `<div class="result-group">
        ${header}
        ${groups[k].slice(0,8).map(r => teamCardHtml(r)).join('')}
      </div>`;
      if (isFull) foundAny = true;
      if (!isFull && groups[k].length > 0) break;
    }
  }
  app.innerHTML = html + '<div id="whybox" style="margin-top:4px;"></div>';
  whyThisTeam(results);
}

function teamCardHtml(r) {
  const meta = [];
  if (state.dist.region) {
    const m = distMins(r.team);
    if (m != null) {
      const ic = state.dist.mode === 'transit' ? '🚇' : '🚗';
      const mode = state.dist.mode === 'transit' ? '대중교통' : '자차';
      meta.push(`<div class="meta" style="color:#60a5fa;">${ic} ${mode} ${m}분${r.distBonus?` (거리 +${r.distBonus})`:''}</div>`);
    }
  }
  return `<div class="team-card">
    <div>
      <div class="name">${r.team} <span style="color:#64748b;font-size:12px;">[${LEAGUE[r.team]}]</span></div>
      ${meta.join('')}
    </div>
    <div class="score-badge">+${Math.round(r.bonus*10)/10}</div>
  </div>`;
}

// ===== Actions =====
function startCards() {
  const scope = document.querySelector('input[name="leagueScope"]:checked');
  state.filters.leagueScope = scope ? scope.value : 'any';
  state.filters.aclOnly = document.getElementById('aclOnly').checked;
  state.step = 0;
  render();
}
function setDistRegion(v) { state.dist.region = v; if(!v) state.dist.pref=''; render(); }
function setDistMode(m) { state.dist.mode = m; render(); }
function selectDistPref(k) { state.dist.pref = k; render(); }
function setDistLimit(n) { state.dist.limit = +n; render(); }
function selectOpt(axisKey, opt) { state.prefs[axisKey] = opt; render(); }
function next() { state.step++; render(); }
function prev() { state.step--; render(); }
function restart() { state.step = -1; state.prefs = {}; state.dist = { region:'', mode:'car', pref:'', limit:60 }; render(); }

// ===== AI 에이전트 (Claude, 키는 localStorage 공유) =====
async function claudeText(prompt, key, maxTok) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTok||600,messages:[{role:'user',content:prompt}]})
  });
  if(!r.ok) throw new Error('API '+r.status);
  const d=await r.json();
  return (d.content && d.content[0] && d.content[0].text || '').trim();
}
async function whyThisTeam(results) {
  const key=(localStorage.getItem('anthropic_key')||'').trim();
  if(!key || !results.length) return;
  const top=results[0];
  const reqN=AXES.filter(a=>state.prefs[a.key]==='required').map(a=>a.name);
  const prefN=AXES.filter(a=>state.prefs[a.key]==='preferred').map(a=>a.name);
  const prof=AXES.filter(a=>['required','preferred'].includes(state.prefs[a.key])).map(a=>`${a.name} ${SCORES[a.key][top.team]}/5`);
  const dist=state.dist.region&&distMins(top.team)!=null ? `거주지에서 ${state.dist.mode==='transit'?'대중교통':'자차'} ${distMins(top.team)}분` : '';
  const box=document.getElementById('whybox');
  box.innerHTML='<div class="result-group" style="border-color:#7c3aed;"><h3 style="color:#a78bfa;">🤖 왜 이 팀일까요?</h3><div class="empty-result">AI 분석 중…</div></div>';
  const prompt=`사용자가 K리그 입덕할 팀을 찾는다. 추천 1위: "${top.team}".\n사용자가 중시한 기준 — 필수: [${reqN.join(', ')||'없음'}], 선호: [${prefN.join(', ')||'없음'}].\n${top.team}의 해당 기준 점수(5점 만점): ${prof.join(', ')||'정보 없음'}. ${dist?dist+'.':''}\n[규칙] 위에 주어진 점수·거리·사용자 선호만 근거로, 이 팀을 왜 추천하는지 2~3문장으로 따뜻하게 설득하라. 팀의 역사·선수·성적 등 주어지지 않은 사실은 절대 지어내지 마라. 한국어 평어체로.`;
  try{
    const txt=await claudeText(prompt, key, 400);
    box.innerHTML=`<div class="result-group" style="border-color:#7c3aed;"><h3 style="color:#a78bfa;">🤖 왜 ${top.team}일까요?</h3><div style="color:#cbd5e1;font-size:14px;line-height:1.65;">${txt}</div></div>`;
  }catch(e){ box.innerHTML=''; }
}
async function aiSearch(btn) {
  const key=(localStorage.getItem('anthropic_key')||'').trim();
  const q=document.getElementById('nlq').value.trim();
  if(!q) return;
  if(!key){ alert('AI 검색은 Claude API 키가 필요해요. "선수 추천 → 플레이스타일 → ⚙️ AI 추천 강화"에서 키를 한 번 입력하면 여기서도 쓰여요.'); return; }
  const scope=document.querySelector('input[name="leagueScope"]:checked');
  state.filters.leagueScope=scope?scope.value:'any';
  state.filters.aclOnly=document.getElementById('aclOnly').checked;
  btn.textContent='AI 분석 중…'; btn.disabled=true;
  const axesList=AXES.map(a=>`${a.key}(${a.name})`).join(', ');
  const prompt=`사용자 요청: "${q}"\n아래 K리그 팀 선호 축을 요청에 맞게 분류하라. 축: ${axesList}.\n각 축 값: "required"(꼭) / "preferred"(있으면좋음) / "neutral"(무관) / "negative"(반대, trophy·recent·cheer만 의미있음).\n거리: 지역명이 있으면 region을 [서울,경기,인천,강원,대전,세종,충남,충북,전북,광주,전남,대구,경북,부산,울산,경남,제주] 중 하나로, 없으면 "". mode는 car/transit, distPref는 required/preferred/neutral, limit은 분(숫자).\n반드시 JSON만 출력: {"prefs":{${AXES.map(a=>'"'+a.key+'":"..."').join(',')}},"region":"","mode":"car","distPref":"neutral","limit":60}`;
  try{
    let t=await claudeText(prompt, key, 700);
    t=t.replace(/^```(json)?/i,'').replace(/```$/,'').trim();
    const j=JSON.parse(t);
    state.prefs={}; AXES.forEach(a=>{ state.prefs[a.key]=j.prefs&&j.prefs[a.key]||'neutral'; });
    state.dist={region:j.region||'', mode:j.mode||'car', pref:(j.region?(j.distPref||'preferred'):''), limit:+j.limit||60};
    state.step=AXES.length+1; render();
  }catch(e){ btn.textContent='AI로 바로 찾기 →'; btn.disabled=false; alert('AI 분석 실패: '+(e.message||e)); }
}

render();
</script>
